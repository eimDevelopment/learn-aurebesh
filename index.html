<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aurebesh Learner</title>
  <link rel="stylesheet" href="css/fonts.css?v=31">
  <link rel="stylesheet" href="css/style.css?v=31">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>AUREBESH</h1>
    </header>

    <!-- Learn screen -->
    <div id="screen-learn" class="screen hidden">
      <div id="learn-level-select" class="drill-level-select">
        <button class="btn-level" onclick="startLearnLevel('all')">All Letters</button>
        <button class="btn-level" onclick="startLearnLevel('similar')">Similar Letters</button>
        <button class="btn-level" onclick="startLearnLevel('transforms')">Transforms</button>
      </div>
      <div id="learn-card" class="learn-card hidden">
        <div id="learn-glyph" class="learn-glyph aurebesh"></div>
        <div id="learn-letter" class="learn-letter"></div>
        <div id="learn-hint-area" class="learn-hint-area">
          <div class="learn-hint-row">
            <div id="learn-hint" class="learn-hint"></div>
            <button id="learn-pin-btn" class="learn-pin-btn" onclick="togglePinHint()" title="Pin this hint">&#9734;</button>
          </div>
          <div id="learn-hint-tabs" class="learn-hint-tabs"></div>
          <div id="learn-custom-input-row" class="learn-custom-input-row hidden">
            <input id="learn-custom-input" type="text" class="learn-custom-input" placeholder="Your mnemonic..." maxlength="120" autocomplete="off">
            <button class="learn-custom-save" onclick="saveCustomHint()">Save</button>
          </div>
        </div>
      </div>
      <div id="learn-compare" class="learn-compare hidden"></div>
      <div class="learn-meta">
        <span id="learn-position"></span>
      </div>
      <div class="learn-nav hidden">
        <button id="learn-prev" onclick="learnPrev()">Prev</button>
        <button id="learn-next" onclick="learnNext()">Next</button>
      </div>
      <div id="learn-transforms" class="learn-transforms hidden">
        <div id="transform-stage" class="transform-stage">
          <span id="transform-font-glyph" class="transform-font-glyph aurebesh"></span>
        </div>
        <button class="btn-animate" onclick="playTransform()">Play</button>
      </div>
    </div>

    <!-- Drill screen -->
    <div id="screen-drill" class="screen hidden">
      <div id="drill-level-select" class="drill-level-select">
        <button class="btn-level" onclick="startDrillLevel('letters')">Letters</button>
        <button class="btn-level" onclick="startDrillLevel('similar')">Similar Letters</button>
        <div class="word-level-group">
          <div class="word-level-label">2-Letter Words</div>
          <div class="word-level-tiers">
            <button class="btn-tier" onclick="startDrillLevel('words2-1')">1</button>
            <button class="btn-tier" onclick="startDrillLevel('words2-2')">2</button>
            <button class="btn-tier" onclick="startDrillLevel('words2-3')">3</button>
          </div>
        </div>
        <div class="word-level-group">
          <div class="word-level-label">3-Letter Words</div>
          <div class="word-level-tiers">
            <button class="btn-tier" onclick="startDrillLevel('words3-1')">1</button>
            <button class="btn-tier" onclick="startDrillLevel('words3-2')">2</button>
            <button class="btn-tier" onclick="startDrillLevel('words3-3')">3</button>
          </div>
        </div>
        <div class="word-level-group">
          <div class="word-level-label">4-Letter Words</div>
          <div class="word-level-tiers">
            <button class="btn-tier" onclick="startDrillLevel('words4-1')">1</button>
            <button class="btn-tier" onclick="startDrillLevel('words4-2')">2</button>
            <button class="btn-tier" onclick="startDrillLevel('words4-3')">3</button>
          </div>
        </div>
        <div class="word-level-group">
          <div class="word-level-label">5-Letter Words</div>
          <div class="word-level-tiers">
            <button class="btn-tier" onclick="startDrillLevel('words5-1')">1</button>
            <button class="btn-tier" onclick="startDrillLevel('words5-2')">2</button>
            <button class="btn-tier" onclick="startDrillLevel('words5-3')">3</button>
          </div>
        </div>
      </div>
      <div id="drill-card" class="drill-card hidden">
        <div id="drill-glyph" class="drill-glyph aurebesh"></div>
      </div>
      <div id="drill-feedback" class="drill-feedback hidden"></div>
      <div id="drill-choice-btns" class="drill-choice-btns hidden"></div>
      <div id="drill-type-area" class="drill-type-area hidden">
        <input id="drill-type-input" type="text" class="drill-type-input" placeholder="Type the letter..." autocomplete="off" autocapitalize="off">
        <button class="btn btn-reveal" onclick="drillSubmitTyped()">Check</button>
      </div>
      <div id="drill-count" class="drill-count"></div>
      <div id="drill-complete" class="drill-complete hidden">
        <div class="drill-complete-title">Session Complete</div>
        <div id="drill-complete-stats" class="drill-complete-stats"></div>
        <div class="drill-complete-actions">
          <button class="btn btn-reveal" onclick="drillRestart()">Drill Again</button>
          <button class="btn btn-level-back" onclick="showDrill()">Other Levels</button>
        </div>
      </div>
    </div>

    <!-- Reference screen -->
    <div id="screen-reference" class="screen hidden">
      <div id="ref-grid" class="ref-grid"></div>
      <div class="confusable-section">
        <h2 class="confusable-title">Similar Letters</h2>
        <div id="confusable-list" class="confusable-list"></div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-btn" data-screen="learn">
        <span class="nav-icon">&#9733;</span>
        Learn
      </button>
      <button class="nav-btn" data-screen="drill">
        <span class="nav-icon">&#9881;</span>
        Drill
      </button>
      <button class="nav-btn" data-screen="reference">
        <span class="nav-icon">&#9776;</span>
        Reference
      </button>
    </nav>
  </div>

  <script src="js/data.js?v=31"></script>
  <script src="js/db.js?v=31"></script>
  <script src="js/srs.js?v=31"></script>
  <script src="js/learn.js?v=31"></script>
  <script src="js/drill.js?v=31"></script>
  <script src="js/app.js?v=31"></script>
</body>
</html>
