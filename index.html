<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aurebesh Learner</title>
  <link rel="stylesheet" href="css/fonts.css?v=41">
  <link rel="stylesheet" href="css/style.css?v=44">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>LEARN AUREBESH</h1>
    </header>

    <!-- Learn screen -->
    <div id="screen-learn" class="screen hidden">
      <div id="learn-level-select" class="drill-level-select">
        <button class="btn-level" onclick="startLearnLevel('all')">All Letters</button>
        <button class="btn-level" onclick="startLearnLevel('similar')">Similar Letters</button>
        <button class="btn-level" onclick="startLearnLevel('transforms')">Transforms</button>
      </div>
      <div id="learn-card" class="learn-card hidden">
        <div id="learn-glyph" class="learn-glyph aurebesh"></div>
        <div id="learn-letter" class="learn-letter"></div>
        <div id="learn-hint-area" class="learn-hint-area">
          <div class="learn-hint-row">
            <div id="learn-hint" class="learn-hint"></div>
            <button id="learn-pin-btn" class="learn-pin-btn" onclick="togglePinHint()" title="Pin this hint">&#9734;</button>
          </div>
          <div id="learn-hint-tabs" class="learn-hint-tabs"></div>
          <div id="learn-custom-input-row" class="learn-custom-input-row hidden">
            <input id="learn-custom-input" type="text" class="learn-custom-input" placeholder="Your mnemonic..." maxlength="120" autocomplete="off">
            <button class="learn-custom-save" onclick="saveCustomHint()">Save</button>
          </div>
        </div>
      </div>
      <div id="learn-compare" class="learn-compare hidden"></div>
      <div class="learn-meta">
        <span id="learn-position"></span>
      </div>
      <div class="learn-nav hidden">
        <button id="learn-prev" onclick="learnPrev()">Prev</button>
        <button id="learn-next" onclick="learnNext()">Next</button>
      </div>
      <div id="learn-transforms" class="learn-transforms hidden">
        <div id="transform-stage" class="transform-stage">
          <span id="transform-font-glyph" class="transform-font-glyph aurebesh"></span>
        </div>
        <button class="btn-animate" onclick="playTransform()">Play</button>
      </div>
    </div>

    <!-- Drill screen -->
    <div id="screen-drill" class="screen hidden">
      <div id="drill-level-select" class="drill-level-select">
        <div class="drill-step active" id="drill-step-level">
          <div class="drill-step-header" onclick="reopenStep('level')">
            <span class="drill-step-label">Type</span>
            <span class="drill-step-value" id="step-level-val"></span>
          </div>
          <div class="drill-step-body drill-step-level-body">
            <button class="btn-level" onclick="selectDrillLevel('letters')">All Letters</button>
            <button class="btn-level" onclick="selectDrillLevel('similar')">Similar Letters</button>
            <button class="btn-level" onclick="selectDrillLevel('words')">Words</button>
          </div>
        </div>
        <div class="drill-step" id="drill-step-difficulty">
          <div class="drill-step-header" onclick="reopenStep('difficulty')">
            <span class="drill-step-label">Difficulty</span>
            <span class="drill-step-value" id="step-diff-val"></span>
          </div>
          <div class="drill-step-body">
            <div class="drill-picker-row" id="drill-diff-row">
              <button class="btn-pick selected" onclick="selectDifficulty('all')">All</button>
              <button class="btn-pick" onclick="selectDifficulty('easy')">Easy</button>
              <button class="btn-pick" onclick="selectDifficulty('medium')">Medium</button>
              <button class="btn-pick" onclick="selectDifficulty('hard')">Hard</button>
            </div>
          </div>
        </div>
        <div class="drill-step" id="drill-step-words">
          <div class="drill-step-header" onclick="reopenStep('words')">
            <span class="drill-step-label">Words</span>
            <span class="drill-step-value" id="step-words-val"></span>
          </div>
          <div class="drill-step-body">
            <div class="drill-picker-label">Word Length</div>
            <div class="drill-picker-row" id="drill-len-row">
              <button class="btn-pick" onclick="selectWordLen(2)">2</button>
              <button class="btn-pick" onclick="selectWordLen(3)">3</button>
              <button class="btn-pick" onclick="selectWordLen(4)">4</button>
              <button class="btn-pick" onclick="selectWordLen(5)">5</button>
              <button class="btn-pick" onclick="selectWordLen(6)">6</button>
              <button class="btn-pick" onclick="selectWordLen(7)">7</button>
            </div>
            <div class="drill-picker-label">Number of Words</div>
            <div class="drill-picker-row" id="drill-tier-row">
              <button class="btn-pick" onclick="selectWordTier(1)">10</button>
              <button class="btn-pick" onclick="selectWordTier(2)">20</button>
              <button class="btn-pick" onclick="selectWordTier(3)">30</button>
            </div>
          </div>
        </div>
        <div class="drill-step" id="drill-step-mode">
          <div class="drill-step-header" onclick="reopenStep('mode')">
            <span class="drill-step-label">Mode</span>
            <span class="drill-step-value" id="step-mode-val"></span>
          </div>
          <div class="drill-step-body">
            <div class="drill-picker-row" id="drill-mode-row">
              <button class="btn-pick selected" onclick="selectDrillMode('choice')">Multiple Choice</button>
              <button class="btn-pick" onclick="selectDrillMode('type')">Type</button>
              <button class="btn-pick" onclick="selectDrillMode('auto')">Mix</button>
            </div>
          </div>
        </div>
        <div class="drill-step" id="drill-step-timer">
          <div class="drill-step-header" onclick="reopenStep('timer')">
            <span class="drill-step-label">Flash Timer</span>
            <span class="drill-step-value" id="step-timer-val"></span>
          </div>
          <div class="drill-step-body">
            <div class="drill-picker-row" id="drill-timer-row">
              <button class="btn-pick selected" onclick="selectFlashTimer(0)">Off</button>
              <button class="btn-pick" onclick="selectFlashTimer(1)">1s</button>
              <button class="btn-pick" onclick="selectFlashTimer(2)">2s</button>
              <button class="btn-pick" onclick="selectFlashTimer(3)">3s</button>
            </div>
          </div>
        </div>
        <div id="drill-start-row" class="drill-start-row hidden">
          <div id="drill-start-info" class="drill-start-info"></div>
          <button class="btn btn-start-drill" onclick="startSelectedDrill()">Start</button>
        </div>
      </div>
      <div id="drill-card" class="drill-card hidden">
        <div id="drill-glyph" class="drill-glyph aurebesh"></div>
      </div>
      <div id="drill-feedback" class="drill-feedback hidden"></div>
      <div id="drill-choice-btns" class="drill-choice-btns hidden"></div>
      <div id="drill-type-area" class="drill-type-area hidden">
        <input id="drill-type-input" type="text" class="drill-type-input" placeholder="Type the letter..." autocomplete="off" autocapitalize="off">
        <button class="btn btn-reveal" onclick="drillSubmitTyped()">Check</button>
      </div>
      <div id="drill-count" class="drill-count"></div>
      <div id="drill-complete" class="drill-complete hidden">
        <div class="drill-complete-title">Session Complete</div>
        <div id="drill-complete-stats" class="drill-complete-stats"></div>
        <div class="drill-complete-actions">
          <button class="btn btn-reveal" onclick="drillRestart()">Drill Again</button>
          <button class="btn btn-level-back" onclick="showDrill()">Other Levels</button>
        </div>
      </div>
    </div>

    <!-- Reference screen -->
    <div id="screen-reference" class="screen hidden">
      <div id="ref-grid" class="ref-grid"></div>
      <div class="confusable-section">
        <h2 class="confusable-title">Similar Letters</h2>
        <div id="confusable-list" class="confusable-list"></div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-btn" data-screen="learn">
        <span class="nav-icon">&#9733;</span>
        Learn
      </button>
      <button class="nav-btn" data-screen="drill">
        <span class="nav-icon">&#9881;</span>
        Drill
      </button>
      <button class="nav-btn" data-screen="reference">
        <span class="nav-icon">&#9776;</span>
        Reference
      </button>
    </nav>
  </div>

  <script src="js/data.js?v=43"></script>
  <script src="js/db.js?v=41"></script>
  <script src="js/srs.js?v=41"></script>
  <script src="js/learn.js?v=42"></script>
  <script src="js/drill.js?v=45"></script>
  <script src="js/app.js?v=41"></script>
</body>
</html>
